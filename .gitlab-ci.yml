variables:
    APP: innovplay_site
    ENVIRONMENT: prod
    RUNNER: vps
    IMAGE_TAG: "$APP:latest"
    CONTAINER_NAME: "$APP"
    HOST_PORT: 8000
    CONTAINER_PORT: 80
    DOCKER_BUILDKIT: 0

workflow:
    rules:
        # Merge Request → dev (preview)
        - if: "$CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME != 'dev'"
          variables:
              ENVIRONMENT: dev
              RUNNER: local
              IMAGE_TAG: "$APP:dev"
              CONTAINER_NAME: "$APP-dev"
              HOST_PORT: 8001
              VITE_API_BASE_URL: https://demo.afimeplay.com.br/api

        # Branch dev
        - if: "$CI_COMMIT_BRANCH == 'dev'"
          variables:
              ENVIRONMENT: dev
              IMAGE_TAG: "$APP:dev"
              CONTAINER_NAME: "$APP-dev"
              HOST_PORT: 8001
              VITE_API_BASE_URL: https://demo.afimeplay.com.br/api

        # Branch main
        - if: "$CI_COMMIT_BRANCH == 'main'"
          variables:
              ENVIRONMENT: prod
              IMAGE_TAG: "$APP:latest"
              CONTAINER_NAME: "$APP"
              HOST_PORT: 8000
              VITE_API_BASE_URL: https://api.afimeplay.com.br

        - when: never

stages:
    - validate_pipeline
    - prebuild
    - build
    - deploy
    - clean

.set_runner_tag:
    tags:
        - $RUNNER

.set_none_git_strategy:
    variables:
        GIT_STRATEGY: none

# ---------------- VALIDATION ----------------

invalid_merge_request:
    stage: validate_pipeline
    extends:
        - .set_runner_tag
        - .set_none_git_strategy
    rules:
        - if: "$CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == 'main'"
    script:
        - |
            echo "$(date '+[%Y-%m-%d %H:%M:%S]') - MR para 'main' só é permitido a partir da branch 'dev'."
            exit 1

# ---------------- CLEAN IMAGE ----------------

image_clean:
    stage: prebuild
    extends:
        - .set_runner_tag
        - .set_none_git_strategy
    script:
        - |
            docker container ls -a -f ancestor="$IMAGE_TAG" -q | xargs -r docker rm -f
            docker image ls -f reference="$IMAGE_TAG" -q | xargs -r docker rmi -f

# ---------------- BUILD ----------------

image_build:
    stage: build
    extends:
        - .set_runner_tag
    environment:
        name: $ENVIRONMENT
    script:
        - |
            set -e

            echo "VITE_API_BASE_URL=$VITE_API_BASE_URL" > .env

            echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Buildando imagem frontend"

            docker build --no-cache -t "$IMAGE_TAG" .

# ---------------- DEPLOY ----------------

container_run:
    stage: deploy
    extends:
        - .set_runner_tag
        - .set_none_git_strategy
    environment:
        name: $ENVIRONMENT
        on_stop: environment_clean
    script:
        - |
            set -e

            docker container rm -f "$CONTAINER_NAME" || true

            docker container run -d \
              --name "$CONTAINER_NAME" \
              --network "$ENVIRONMENT" \
              -p "$HOST_PORT:$CONTAINER_PORT" \
              "$IMAGE_TAG"

            sleep 10

            docker inspect -f "{{.State.Running}}" "$CONTAINER_NAME" | grep true

            echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Frontend '$CONTAINER_NAME' rodando com sucesso."

# ---------------- CLEAN ENV ----------------

environment_clean:
    stage: clean
    extends:
        - .set_none_git_strategy
    environment:
        name: $ENVIRONMENT
        action: stop
    rules:
        - if: "$ENVIRONMENT == 'dev'"
          when: manual
    allow_failure: true
