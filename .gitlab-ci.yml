variables:
    APP: innovplay_site
    ENVIRONMENT: prod
    RUNNER: vps
    IMAGE_TAG: "$APP:latest"
    CONTAINER_NAME: "$APP"
    HOST_PORT: 8000
    CONTAINER_PORT: 80
    DOCKER_BUILDKIT: 0

workflow:
    rules:
        # MR / local
        - if: "$CI_PIPELINE_SOURCE == 'merge_request_event'"
          variables:
              ENVIRONMENT: dev
              RUNNER: local
              IMAGE_TAG: "$APP:local"
              CONTAINER_NAME: "$APP-local"
              HOST_PORT: 8002
              API_UPSTREAM: demo-api.afirmeplay.com.br

        # dev na VPS
        - if: "$CI_COMMIT_BRANCH == 'dev'"
          variables:
              ENVIRONMENT: dev
              IMAGE_TAG: "$APP:dev"
              CONTAINER_NAME: "$APP-dev"
              HOST_PORT: 8001
              API_UPSTREAM: innovplay_api-dev:5000

        # prod
        - if: "$CI_COMMIT_BRANCH == 'main'"
          variables:
              ENVIRONMENT: prod
              IMAGE_TAG: "$APP:latest"
              CONTAINER_NAME: "$APP"
              HOST_PORT: 8000
              API_UPSTREAM: innovplay_api:5000

        - when: never

stages:
    - validate_pipeline
    - prebuild
    - build
    - deploy
    - clean

.set_runner_tag:
    tags:
        - $RUNNER

.set_none_git_strategy:
    variables:
        GIT_STRATEGY: none

# ---------------- VALIDATION ----------------

invalid_merge_request:
    stage: validate_pipeline
    extends:
        - .set_runner_tag
        - .set_none_git_strategy
    rules:
        - if: "$CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == 'main'"
    script:
        - |
            echo "$(date '+[%Y-%m-%d %H:%M:%S]') - MR para 'main' só é permitido a partir da branch 'dev'."
            exit 1

# ---------------- CLEAN IMAGE ----------------

image_clean:
    stage: prebuild
    extends:
        - .set_runner_tag
        - .set_none_git_strategy
    script:
        - |
            docker container ls -a -f ancestor="$IMAGE_TAG" -q | xargs -r docker rm -f
            docker image ls -f reference="$IMAGE_TAG" -q | xargs -r docker rmi -f

# ---------------- BUILD ----------------

image_build:
    stage: build
    extends:
        - .set_runner_tag
    environment:
        name: $ENVIRONMENT
    script:
        - |
            set -e

            echo "VITE_API_BASE_URL=/api" > .env

            echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Instalando envsubst"
            apk add --no-cache gettext

            echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Gerando nginx.conf"
            envsubst '$API_HOST' < nginx.conf.template > nginx.conf

            docker build --no-cache -t "$IMAGE_TAG" .

# ---------------- DEPLOY ----------------

container_run:
    stage: deploy
    extends:
        - .set_runner_tag
        - .set_none_git_strategy
    environment:
        name: $ENVIRONMENT
        on_stop: environment_clean
    script:
        - |
            set -e

            echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Verificando network '$ENVIRONMENT'"

            NETWORK_ID=$(docker network ls -f name="^${ENVIRONMENT}$" -q)

            if [ -z "$NETWORK_ID" ]; then
                docker network create "$ENVIRONMENT"
                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Network '$ENVIRONMENT' criada."
            else
                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Network '$ENVIRONMENT' já existe."
            fi

            docker container run \
                --network "$ENVIRONMENT" \
                -p "$HOST_PORT:$CONTAINER_PORT" \
                --name "$CONTAINER_NAME" \
                -d "$IMAGE_TAG"

            CONTAINER_ID=$(docker container ls -a -f name="^${CONTAINER_NAME}$" -q)

            if [ -z "$CONTAINER_ID" ]; then
                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Falha ao criar o container '$CONTAINER_NAME'."
                exit 1
            else
                sleep 10

                IS_RUNNING=$(docker inspect -f "{{.State.Running}}" "$CONTAINER_ID")

                if [ "$IS_RUNNING" = "true" ]; then
                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container '$CONTAINER_NAME' está em execução."
                else
                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container '$CONTAINER_NAME' foi criado mas parou."
                    docker logs "$CONTAINER_ID"
                    exit 1
                fi
            fi

# ---------------- CLEAN ENV ----------------

environment_clean:
    stage: clean
    extends:
        - .set_none_git_strategy
    environment:
        name: $ENVIRONMENT
        action: stop
    rules:
        - if: "$ENVIRONMENT == 'dev'"
          when: manual
    allow_failure: true
    script:
        - echo "Stopping environment $ENVIRONMENT"
