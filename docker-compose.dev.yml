services:
  app:
    image: afirmeplay/afirmeplay-frontend:${VERSION}
    container_name: afirmeplay_front_dev
    environment:
      - API_CONTAINER=${API_CONTAINER}
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    ports:
      - "8001:80/tcp"
    networks:
      - afirmeplay_network_dev
    restart: unless-stopped


networks:
  afirmeplay_network_dev:
    name: afirmeplay_network_dev
    external: true