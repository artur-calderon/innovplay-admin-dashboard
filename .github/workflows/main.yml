name: Frontend Pipeline

on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    deploy:
        runs-on: [self-hosted, vps-artur]
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Login Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
                  password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

            - name: Get Version
              run: |
                  VERSION=$(cat VERSION)
                  echo "VERSION=${VERSION}" >> $GITHUB_ENV

            - name: Deploy
              run: |
                  VERSION=v${{ env.VERSION }} docker compose -f docker-compose.prod.yml pull
                  VERSION=v${{ env.VERSION }} docker compose -f docker-compose.prod.yml up -d
