name: Frontend Pipeline

on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    deploy:
        runs-on: [self-hosted, vps-afirme]
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Login Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
                  password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

            - name: Deploy
              run: |
                  export COMPOSE_PROJECT_NAME=afirmeplay_front_prod # Isso faz com que o docker compose separe os containers de produção dos de desenvolvimento
                  export VERSION=v$(cat VERSION)
                  export API_CONTAINER=${{ secrets.API_CONTAINER_PROD }}
                  export VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}

                  docker compose -f docker-compose.prod.yml pull
                  docker compose -f docker-compose.prod.yml up -d
