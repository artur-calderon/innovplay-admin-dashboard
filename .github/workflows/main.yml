name: Frontend Pipeline

on:
    push:
        branches:
            - dev
    workflow_dispatch:

jobs:
    build:
        runs-on: [self-hosted, vps-artur]

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Get Version
              run: |
                  VERSION=$(cat VERSION)
                  echo "VERSION=${VERSION}" >> $GITHUB_ENV

            - name: Build Images
              run: |
                  docker build -t afirmeplay/afirmeplay-frontend:v${{ env.VERSION }} .
                  docker build -t afirmeplay/afirmeplay-frontend:latest .

    push:
        runs-on: [self-hosted, vps-artur]
        needs: [build]
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Login Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
                  password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

            - name: Get Version
              run: |
                  VERSION=$(cat VERSION)
                  echo "VERSION=${VERSION}" >> $GITHUB_ENV

            - name: Push Images
              run: |
                  docker push afirmeplay/afirmeplay-frontend:v${{ env.VERSION }}
                  docker push afirmeplay/afirmeplay-frontend:latest

    deploy:
        runs-on: [self-hosted, vps-artur]
        needs: [push]
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Get Version
              run: |
                  VERSION=$(cat VERSION)
                  echo "VERSION=${VERSION}" >> $GITHUB_ENV
                  echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" >> $GITHUB_ENV
                  echo "API_CONTAINER=${{ secrets.API_CONTAINER_DEV}}" >> $GITHUB_ENV

            - name: Deploy
              run: |
                  VERSION=v${{ env.VERSION }} docker compose -f docker-compose.dev.yml pull
                  VERSION=v${{ env.VERSION }} docker compose -f docker-compose.dev.yml up -d
